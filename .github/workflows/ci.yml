name: CI Pipeline

on:

  push:
    branches:
      - main

jobs:

  quality:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3

        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: ESLint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build